<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Photo Blaster</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">

  <style>
    body {
      background: #000;
      color: #eee;
      font-family: system-ui, Arial, sans-serif;
      margin: 0;
    }

    a {
      color: #f0c15c;
      text-decoration: none;
    }

    a:hover {
      color: #ffd77f;
    }

    .hero {
      display: flex;
      justify-content: center;
      padding: 40px 20px 24px;
    }

    .hero img {
      max-width: 900px;
      width: 100%;
      height: auto;
    }

    .content {
      max-width: 900px;
      margin: 0 auto;
      padding: 0 24px 60px;
    }

    .content p {
      color: rgba(255,255,255,0.85);
      margin-bottom: 16px;
      max-width: 760px;
    }

    .play-btn {
      display: inline-flex;
      align-items: center;
      gap: 10px;
      padding: 12px 20px;
      margin-top: 8px;
      border: 1px solid rgba(255,255,255,0.45);
      background: rgba(255,255,255,0.06);
      color: #ffd77f;
      font-size: 0.9rem;
      letter-spacing: 0.1em;
      text-transform: uppercase;
      transition: background 0.2s, border-color 0.2s;
    }

    .play-btn:hover {
      background: rgba(255,255,255,0.12);
      border-color: rgba(255,215,120,0.8);
      color: #ffd77f;
    }
  </style>
</head>

<body>

<div class="hero">
  <img src="PB-title.png" alt="Photo Blaster">
</div>

<div class="content">
  <p>
    Photo Blaster is a fast, chaotic, camera‑powered arcade shooter.
    Pre‑Release testing is starting soon.
  </p>

  <a class="play-btn" href="play.html">&#9654; Play Web Version</a>
</div>

</body>
</html>
