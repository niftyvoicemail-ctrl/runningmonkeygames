<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Thank You — RMG</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
  body {
    background: #0a0a0a;
    color: #ddd;
    font-family: Georgia, 'Times New Roman', serif;
    min-height: 100vh;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    padding: 40px 20px;
    text-align: center;
  }
  .card { width: 100%; max-width: 460px; }
  .logo {
    width: 80px;
    margin: 0 auto 20px;
  }
  .eyebrow {
    font-family: 'Courier New', monospace;
    font-size: .7rem;
    letter-spacing: .18em;
    text-transform: uppercase;
    color: #666;
    margin-bottom: 10px;
  }
  h1 {
    font-size: 1.9rem;
    font-weight: normal;
    color: #eee;
    line-height: 1.2;
    margin-bottom: 18px;
  }
  .desc {
    font-size: .9rem;
    color: #999;
    line-height: 1.7;
    margin-bottom: 24px;
  }
  .note {
    font-family: 'Courier New', monospace;
    font-size: .68rem;
    color: #3a3a3a;
    line-height: 1.5;
  }
</style>
</head>
<body>
<div class="card">

  <!-- Add your logo -->
  <img src="/RMG-logo.png" class="logo" alt="RMG Logo">

  <div class="eyebrow">Payment Received</div>
  <h1>Thank You</h1>

  <p class="desc">
    Your support helps continue development and expansion of the project.
  </p>

  <div class="note">
    RMG · Camp Babbling · Lunar Work<br>
    Independent development in progress.
  </div>

</div>
</body>
</html>
